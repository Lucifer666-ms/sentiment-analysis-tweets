<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a; /* dark blue */
            color: #e2e8f0; /* light text */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #38bdf8;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            border: none;
            padding: 10px;
            background: #334155;
            color: white;
            font-size: 14px;
            outline: none;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #020617;
        }

        .positive {
            color: #22c55e;
            font-weight: bold;
        }

        .negative {
            color: #ef4444;
            font-weight: bold;
        }

        .neutral {
            color: #facc15;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1> Sentiment Analyzer</h1>

    <form action="/predict" method="post">
        <textarea name="tweet" placeholder="Enter your tweet here..." required></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
    <div class="result">
        <p><b>Tweet:</b> {{ text }}</p>

        {% if result == 'positive' %}
            <p class="positive">😊 Positive</p>
        {% elif result == 'negative' %}
            <p class="negative">😡 Negative</p>
        {% else %}
            <p class="neutral">😐 Neutral</p>
        {% endif %}
    </div>
    {% endif %}
</div>

</body>
</html>
